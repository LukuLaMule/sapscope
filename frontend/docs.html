<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentation — SAPscope</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --bg-2:     #111111;
      --card:     #161616;
      --border:   rgba(255,255,255,.08);
      --border-2: rgba(255,255,255,.06);
      --fg:       #f0f0f0;
      --fg-2:     rgba(240,240,240,.65);
      --fg-3:     rgba(240,240,240,.35);
      --accent:   #2997ff;
      --green:    #34d399;
      --orange:   #fb923c;
      --r:        14px;
      --sidebar:  260px;
      color-scheme: dark;
    }

    :root.light {
      --bg:       #f4f7fc;
      --bg-2:     #eaf0f9;
      --card:     #ffffff;
      --border:   rgba(37,99,235,.18);
      --border-2: rgba(37,99,235,.09);
      --fg:       #0d1f38;
      --fg-2:     rgba(13,31,56,.7);
      --fg-3:     rgba(13,31,56,.4);
      --accent:   #2563eb;
      color-scheme: light;
    }

    html, body { height: 100%; background: var(--bg); color: var(--fg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 52px;
      background: rgba(10,10,10,.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-2);
      transition: background .3s;
    }
    :root.light nav { background: rgba(244,247,252,.9); }
    .theme-toggle {
      background: none; border: none; cursor: pointer; padding: 6px;
      border-radius: 8px; color: var(--fg-2);
      display: flex; align-items: center; justify-content: center;
      transition: color .2s, background .2s;
    }
    .theme-toggle:hover { color: var(--fg); background: rgba(255,255,255,.06); }
    :root.light .theme-toggle:hover { background: rgba(0,0,0,.06); }
    .theme-toggle svg { width: 17px; height: 17px; transition: transform .4s cubic-bezier(.4,0,.2,1), opacity .25s; }
    .icon-moon { display: none; }
    :root.light .icon-sun  { display: none; }
    :root.light .icon-moon { display: block; }
    .nav-logo { font-size: 15px; font-weight: 700; color: var(--fg); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .nav-right { display: flex; gap: 20px; align-items: center; }
    .nav-right a { font-size: 13px; color: var(--fg-3); text-decoration: none; transition: color .2s; }
    .nav-right a:hover { color: var(--fg); }
    .nav-right .btn-nav {
      background: var(--accent); color: #fff; padding: 6px 16px;
      border-radius: 8px; font-weight: 600; font-size: 13px;
    }
    .nav-right .btn-nav:hover { opacity: .88; color: #fff; }

    /* ── LAYOUT ── */
    .docs-layout {
      display: flex; min-height: calc(100vh - 52px);
    }

    /* ── SIDEBAR ── */
    .docs-sidebar {
      width: var(--sidebar); flex-shrink: 0;
      background: var(--bg-2);
      border-right: 1px solid var(--border-2);
      padding: 24px 0;
      position: sticky; top: 52px; height: calc(100vh - 52px);
      overflow-y: auto;
    }
    .sidebar-section { margin-bottom: 8px; }
    .sidebar-section-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--fg-3); padding: 8px 20px 6px;
    }
    .sidebar-link {
      display: block; padding: 8px 20px;
      font-size: 13px; color: var(--fg-2);
      text-decoration: none; cursor: pointer;
      transition: background .15s, color .15s;
      border-left: 2px solid transparent;
    }
    .sidebar-link:hover { background: rgba(255,255,255,.04); color: var(--fg); }
    .sidebar-link.active {
      background: rgba(41,151,255,.08);
      border-left-color: var(--accent);
      color: var(--fg);
    }

    /* ── LANG TOGGLE ── */
    .lang-toggle {
      display: flex; margin: 0 16px 16px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
    }
    .lang-btn {
      flex: 1; padding: 7px 0; text-align: center;
      font-size: 12px; font-weight: 600; cursor: pointer;
      color: var(--fg-3); transition: background .15s, color .15s;
      border: none; background: transparent;
    }
    .lang-btn.active { background: var(--accent); color: #fff; }

    /* ── MAIN CONTENT ── */
    .docs-content {
      flex: 1; padding: 48px 64px; max-width: 860px;
      min-width: 0;
    }

    /* ── MARKDOWN STYLES ── */
    .md-body h1 { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; line-height: 1.2; }
    .md-body h2 { font-size: 20px; font-weight: 700; margin: 36px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border-2); }
    .md-body h3 { font-size: 16px; font-weight: 600; margin: 24px 0 8px; color: var(--fg); }
    .md-body p { font-size: 15px; color: var(--fg-2); line-height: 1.75; margin-bottom: 14px; }
    .md-body ul, .md-body ol { padding-left: 20px; margin-bottom: 14px; }
    .md-body li { font-size: 15px; color: var(--fg-2); line-height: 1.75; margin-bottom: 4px; }
    .md-body strong { color: var(--fg); font-weight: 600; }
    .md-body em { color: var(--fg-2); font-style: italic; }
    .md-body code {
      font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px;
      background: rgba(255,255,255,.07); border: 1px solid var(--border);
      border-radius: 5px; padding: 2px 6px; color: #a78bfa;
    }
    .md-body pre {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 18px 20px; overflow-x: auto;
      margin: 16px 0;
    }
    .md-body pre code {
      background: none; border: none; padding: 0;
      font-size: 13px; color: var(--fg-2);
    }
    .md-body blockquote {
      border-left: 3px solid var(--accent); padding: 10px 16px;
      background: rgba(41,151,255,.06); border-radius: 0 8px 8px 0;
      margin: 16px 0;
    }
    .md-body blockquote p { margin: 0; color: var(--fg-2); }
    .md-body table {
      width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px;
    }
    .md-body th, .md-body td {
      padding: 10px 14px; border: 1px solid var(--border);
      text-align: left; color: var(--fg-2);
    }
    .md-body th { background: var(--card); font-weight: 600; color: var(--fg); font-size: 12px; text-transform: uppercase; letter-spacing: .05em; }
    .md-body tr:hover td { background: rgba(255,255,255,.02); }
    .md-body a { color: var(--accent); text-decoration: none; }
    .md-body a:hover { text-decoration: underline; }
    .md-body hr { border: none; border-top: 1px solid var(--border-2); margin: 28px 0; }
    .md-body img { max-width: 100%; border-radius: 10px; }

    /* ── LOADING STATE ── */
    .docs-loading {
      display: flex; align-items: center; gap: 12px;
      color: var(--fg-3); font-size: 14px; padding: 40px 0;
    }
    .docs-loading::before {
      content: ''; width: 16px; height: 16px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MOBILE ── */
    .sidebar-toggle {
      display: none; padding: 6px 10px; background: var(--card);
      border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
      font-size: 13px; color: var(--fg-2);
    }
    @media (max-width: 768px) {
      .docs-sidebar {
        position: fixed; left: -100%; top: 52px; z-index: 50;
        height: calc(100vh - 52px); transition: left .25s;
      }
      .docs-sidebar.open { left: 0; }
      .docs-content { padding: 28px 20px; }
      .sidebar-toggle { display: block; }
    }
  </style>
</head>
<body>

<nav>
  <a href="https://sapscope.com" class="nav-logo">SAP<span>scope</span></a>
  <div class="nav-right">
    <button class="sidebar-toggle" id="sidebarToggle">☰ Guides</button>
    <a href="https://sapscope.com/#pricing">Tarifs</a>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
    <a href="https://app.sapscope.com" class="btn-nav">Accéder à l'app →</a>
  </div>
</nav>

<div class="docs-layout">
  <!-- Sidebar -->
  <aside class="docs-sidebar" id="sidebar">

    <!-- Language toggle -->
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">🇬🇧 EN</button>
      <button class="lang-btn" id="btn-fr" onclick="setLang('fr')">🇫🇷 FR</button>
    </div>

    <!-- Guides list -->
    <div class="sidebar-section">
      <div class="sidebar-section-title" data-nav-section="user_guides">Guides utilisateur</div>
      <a class="sidebar-link" data-guide="guide-01-connexion" data-nav-en="01 — Login" data-nav-fr="01 — Connexion" onclick="loadGuide(this)">01 — Login</a>
      <a class="sidebar-link" data-guide="guide-02-landscape" data-nav-en="02 — Landscape View" data-nav-fr="02 — Vue Landscape" onclick="loadGuide(this)">02 — Landscape View</a>
      <a class="sidebar-link" data-guide="guide-03-detail-systeme" data-nav-en="03 — System Detail" data-nav-fr="03 — Détail système" onclick="loadGuide(this)">03 — System Detail</a>
      <a class="sidebar-link" data-guide="guide-04-diagnostic-ia" data-nav-en="04 — AI Diagnostics" data-nav-fr="04 — Diagnostic IA" onclick="loadGuide(this)">04 — AI Diagnostics</a>
      <a class="sidebar-link" data-guide="guide-05-diff" data-nav-en="05 — Snapshot Compare" data-nav-fr="05 — Comparaison snapshots" onclick="loadGuide(this)">05 — Snapshot Compare</a>
      <a class="sidebar-link" data-guide="guide-06-export-pdf" data-nav-en="06 — PDF Export" data-nav-fr="06 — Export PDF" onclick="loadGuide(this)">06 — PDF Export</a>
      <a class="sidebar-link" data-guide="guide-12-report" data-nav-en="12 — Scheduled Reports" data-nav-fr="12 — Rapports automatiques" onclick="loadGuide(this)">12 — Scheduled Reports</a>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title" data-nav-section="admin">Administration</div>
      <a class="sidebar-link" data-guide="guide-07-admin-utilisateurs" data-nav-en="07 — Users" data-nav-fr="07 — Utilisateurs" onclick="loadGuide(this)">07 — Users</a>
      <a class="sidebar-link" data-guide="guide-08-admin-clients-tokens" data-nav-en="08 — Clients &amp; Tokens" data-nav-fr="08 — Clients &amp; Tokens" onclick="loadGuide(this)">08 — Clients &amp; Tokens</a>
      <a class="sidebar-link" data-guide="guide-09-recovery" data-nav-en="09 — Recovery &amp; edge cases" data-nav-fr="09 — Récupération &amp; edge cases" onclick="loadGuide(this)">09 — Recovery &amp; edge cases</a>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title" data-nav-section="sap_install">SAP Setup</div>
      <a class="sidebar-link" data-guide="sap-rfc-user-setup" data-nav-en="RFC SAP User" data-nav-fr="Utilisateur RFC SAP" onclick="loadGuide(this)">RFC SAP User</a>
    </div>
  </aside>

  <!-- Content -->
  <main class="docs-content">
    <div id="md-output" class="md-body"></div>
  </main>
</div>

<script>
  let currentLang = 'en';
  let currentGuide = 'guide-01-connexion';

  const NAV_SECTIONS = {
    user_guides: { en: 'User Guides',    fr: 'Guides utilisateur' },
    admin:       { en: 'Administration', fr: 'Administration'      },
    sap_install: { en: 'SAP Setup',      fr: 'Installation SAP'   },
  };

  function setLang(lang) {
    currentLang = lang;
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-fr').classList.toggle('active', lang === 'fr');

    // Traduire les titres de section
    document.querySelectorAll('[data-nav-section]').forEach(el => {
      const key = el.dataset.navSection;
      if (NAV_SECTIONS[key]) el.textContent = NAV_SECTIONS[key][lang];
    });

    // Traduire les liens
    document.querySelectorAll('.sidebar-link[data-nav-en]').forEach(el => {
      el.textContent = lang === 'fr' ? el.dataset.navFr : el.dataset.navEn;
    });

    renderGuide(currentGuide);
  }

  function loadGuide(el) {
    // Update active state
    document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
    el.classList.add('active');
    currentGuide = el.dataset.guide;
    renderGuide(currentGuide);
    // Close sidebar on mobile
    document.getElementById('sidebar').classList.remove('open');
    // Update URL hash
    history.replaceState(null, '', '#' + currentGuide);
  }

  async function renderGuide(guide) {
    const output = document.getElementById('md-output');
    output.innerHTML = '<div class="docs-loading">Chargement…</div>';

    // Build file path: sap-rfc-user-setup has no lang variant
    let path;
    if (guide === 'sap-rfc-user-setup') {
      path = '/docs/' + guide + '.md';
    } else {
      path = currentLang === 'fr'
        ? '/docs/' + guide + '.fr.md'
        : '/docs/' + guide + '.md';
    }

    try {
      const res = await fetch(path);
      if (!res.ok) throw new Error('Not found');
      const text = await res.text();

      // Strip the language badge line (first line if it contains 🇬🇧 or 🇫🇷)
      const lines = text.split('\n');
      const cleaned = (lines[0].includes('🇬🇧') || lines[0].includes('🇫🇷'))
        ? lines.slice(1).join('\n').trimStart()
        : text;

      output.innerHTML = marked.parse(cleaned);
    } catch (e) {
      output.innerHTML = '<p style="color:var(--fg-3)">Guide introuvable.</p>';
    }
  }

  // Mobile sidebar toggle
  document.getElementById('sidebarToggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
  });

  // Dark / light toggle
  (function () {
    const btn    = document.getElementById('theme-toggle');
    const htmlEl = document.documentElement;
    const KEY    = 'sapscope_theme';

    function setTheme(theme) {
      htmlEl.classList.toggle('light', theme === 'light');
      localStorage.setItem(KEY, theme);
    }

    const saved = localStorage.getItem(KEY);
    if (saved) {
      setTheme(saved);
    } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
      setTheme('light');
    }

    btn.addEventListener('click', function () {
      setTheme(htmlEl.classList.contains('light') ? 'dark' : 'light');
    });
  })();

  // Appliquer les titres traduits au chargement
  setLang(currentLang);

  // Load from URL hash or default to first guide
  const hash = location.hash.replace('#', '');
  const guideNames = Array.from(document.querySelectorAll('.sidebar-link')).map(l => l.dataset.guide);
  const initial = guideNames.includes(hash) ? hash : 'guide-01-connexion';
  const initialLink = document.querySelector(`[data-guide="${initial}"]`);
  if (initialLink) {
    initialLink.classList.add('active');
    currentGuide = initial;
  }
  renderGuide(currentGuide);
</script>
</body>
</html>
