<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAPscope</title>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self';
                 style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
                 font-src https://fonts.gstatic.com;
                 connect-src 'self' https:;
                 img-src 'self' data:;">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Login screen ────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-bg"></div>
  <!-- Login form -->
  <form id="login-form" class="login-box">
    <div class="login-logo">SAP<span>scope</span></div>
    <div class="login-subtitle">SAP Landscape Intelligence</div>
    <div class="demo-hint">
      Compte de démonstration —
      <button type="button" id="fill-demo">Connexion automatique</button>
    </div>
    <input id="login-email" type="email"    placeholder="email"           autocomplete="email"            required>
    <input id="login-pass"  type="password" placeholder="mot de passe"    autocomplete="current-password" required>
    <div id="login-error" class="login-error"></div>
    <button id="login-btn" type="submit">Connexion →</button>
    <div class="login-switch">Pas encore de compte ? <a id="show-register">S'inscrire</a></div>
  </form>

  <!-- Register form -->
  <form id="register-form" class="login-box" style="display:none">
    <div class="login-logo">SAP<span>scope</span></div>
    <div class="login-subtitle">Créer un compte</div>
    <input id="reg-email"    type="email"    placeholder="email professionnel"  autocomplete="email"     required>
    <input id="reg-pass"     type="password" placeholder="mot de passe (12 car. min)" autocomplete="new-password" required>
    <input id="reg-pass2"    type="password" placeholder="confirmer le mot de passe"  autocomplete="new-password" required>
    <div id="reg-error" class="login-error"></div>
    <button id="reg-btn" type="submit">Créer mon compte →</button>
    <div class="login-switch">Déjà un compte ? <a id="show-login">Se connecter</a></div>
  </form>
</div>

<!-- ── App screen ──────────────────────────────────────────────────────────── -->
<div id="app-screen" style="display:none">
  <div id="app">
    <div id="topbar">
      <div class="logo">SAP<span>scope</span></div>
      <div id="status-dot"></div>
      <select id="client-select"></select>
      <div class="spacer"></div>
      <button id="admin-btn" style="display:none">⚙ admin</button>
      <button id="logout-btn">logout</button>
    </div>
    <div id="main">
      <div id="sidebar">
        <div id="sidebar-header">
          <span>Systems</span>
        </div>
        <button id="overview-btn" title="Vue d'ensemble de l'architecture SAP">
          <span class="overview-btn-icon">⊞</span>
          <span class="overview-btn-labels">
            <span class="overview-btn-text">LANDSCAPE</span>
            <span class="overview-btn-sub">Vue d'ensemble</span>
          </span>
        </button>
        <div id="system-list"></div>
      </div>
      <div id="content">
        <div class="placeholder">Select a system.</div>
      </div>
    </div>
  </div>
</div>

<!-- ── Admin panel ──────────────────────────────────────────────────────────── -->
<div id="admin-modal" style="display:none">
  <div class="admin-overlay" id="admin-overlay"></div>
  <div class="admin-panel">
    <div class="admin-panel-hdr">
      <div class="admin-panel-title">SAP<span>scope</span> — Administration</div>
      <button id="admin-close-btn">✕</button>
    </div>
    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="users">Utilisateurs</button>
      <button class="admin-tab" data-tab="clients">Clients</button>
    </div>
    <div id="admin-tab-content" class="admin-tab-content"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
