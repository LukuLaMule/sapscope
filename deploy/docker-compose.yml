services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       sapscope
      POSTGRES_USER:     sapscope
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sapscope"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    image: ghcr.io/sapscope/backend:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL:         postgresql+asyncpg://sapscope:${POSTGRES_PASSWORD}@db:5432/sapscope
      SAPSCOPE_JWT_SECRET:  ${SAPSCOPE_JWT_SECRET}
      ENV:                  production
      DEBUG:                "false"
      REGISTRATION_ENABLED: "false"
      LICENSE_KEY:          ${LICENSE_KEY}
      ALLOWED_ORIGINS:      ${APP_URL:-http://localhost}
      APP_URL:              ${APP_URL:-http://localhost}
      # SMTP — reset de mot de passe (optionnel)
      SMTP_HOST:     ${SMTP_HOST:-}
      SMTP_PORT:     ${SMTP_PORT:-587}
      SMTP_USER:     ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM:     ${SMTP_FROM:-noreply@sapscope.com}
      # Rapport journalier (optionnel)
      REPORT_ENABLED: ${REPORT_ENABLED:-false}
      REPORT_HOUR:    ${REPORT_HOUR:-7}
      REPORT_TZ:      ${REPORT_TZ:-Europe/Paris}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  frontend:
    image: ghcr.io/sapscope/frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${HTTP_PORT:-80}:80"
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
