services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       sapscope
      POSTGRES_USER:     sapscope
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sapscope"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL:        postgresql+asyncpg://sapscope:${POSTGRES_PASSWORD}@db:5432/sapscope
      SAPSCOPE_JWT_SECRET: ${SAPSCOPE_JWT_SECRET}
      ANTHROPIC_API_KEY:   ${ANTHROPIC_API_KEY}
      ALLOWED_ORIGINS:        ${ALLOWED_ORIGINS:-https://app.sapscope.com}
      ENV:                    ${ENV:-production}
      DEBUG:                  ${DEBUG:-false}
      # SaaS : true (auto-inscription activée)
      # Self-hosted : false (admin crée les comptes)
      REGISTRATION_ENABLED:   ${REGISTRATION_ENABLED:-true}
      # Self-hosted uniquement : clé de licence générée par generate_license.py
      LICENSE_KEY:            ${LICENSE_KEY:-}
      # Stripe (SaaS billing)
      STRIPE_SECRET_KEY:       ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET:   ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_SOLO:       ${STRIPE_PRICE_SOLO:-}
      STRIPE_PRICE_TEAM:       ${STRIPE_PRICE_TEAM:-}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-}
      # SMTP (reset de mot de passe)
      SMTP_HOST:     ${SMTP_HOST:-}
      SMTP_PORT:     ${SMTP_PORT:-587}
      SMTP_USER:     ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM:     ${SMTP_FROM:-noreply@sapscope.com}
      APP_URL:       ${APP_URL:-https://app.sapscope.com}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - web
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.sapscope.rule=Host(`sapscope.com`) || Host(`app.sapscope.com`)"
      - "traefik.http.routers.sapscope.entrypoints=websecure"
      - "traefik.http.routers.sapscope.tls=true"
      - "traefik.http.routers.sapscope.tls.certresolver=lets-encrypt"
      - "traefik.http.routers.sapscope-http.rule=Host(`sapscope.com`) || Host(`app.sapscope.com`)"
      - "traefik.http.routers.sapscope-http.entrypoints=web"
      - "traefik.http.routers.sapscope-http.middlewares=sapscope-https"
      - "traefik.http.middlewares.sapscope-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.sapscope-https.redirectscheme.permanent=true"
      - "traefik.http.services.sapscope.loadbalancer.server.port=80"

volumes:
  pgdata:

networks:
  web:
    external: true
  internal:
    driver: bridge
