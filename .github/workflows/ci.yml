name: CI/CD

on:
  push:
    branches: [main]

jobs:
  # ── Step 1 : tests backend ──────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sapscope
          POSTGRES_PASSWORD: sapscope
          POSTGRES_DB: sapscope_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Run backend tests
        working-directory: ./backend
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://sapscope:sapscope@localhost:5432/sapscope_test
        run: python -m pytest tests/ -v --timeout=30

  # ── Step 2 : build & push images, deploy ───────────────────────────────────
  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/lukulamule/sapscope-backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-react
          push: true
          tags: ghcr.io/lukulamule/sapscope-frontend:latest

      - name: Deploy sur le serveur
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/opc/Docker/sites/sapscope
            docker compose pull backend frontend
            docker compose up -d --no-build backend frontend
