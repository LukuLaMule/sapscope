# ── Landing page — sapscope.com ───────────────────────────────────────────────
server {
    listen 80;
    server_name sapscope.com;

    location /fonts/ {
        root   /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Fichiers de déploiement self-hosted
    location /deploy/ {
        root       /usr/share/nginx/html;
        autoindex  off;
        expires    1h;
        add_header Cache-Control "no-cache";
        add_header Content-Disposition "attachment";
    }

    # API → backend (pour le formulaire trial sur la landing)
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        client_max_body_size 5m;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;

        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        location ~* \.(css|js|svg)$ {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }
}



# ── Application — app.sapscope.com ────────────────────────────────────────────
server {
    listen 80;
    server_name app.sapscope.com;

    # API → backend
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        client_max_body_size 5m;
    }

    location /healthz {
        proxy_pass http://backend:8000;
    }

    # Agent distribution (tarball + checksum)
    location /dist/ {
        root       /usr/share/nginx/html;
        autoindex  off;
        expires    1h;
        add_header Cache-Control "public, no-transform";
    }

    # Documentation
    location = /docs {
        root       /usr/share/nginx/html;
        try_files  /docs.html =404;
    }

    location /docs/ {
        root       /usr/share/nginx/html;
        autoindex  off;
    }

    # Polices self-hébergées
    location /fonts/ {
        root       /usr/share/nginx/html;
        expires    1y;
        add_header Cache-Control "public, immutable";
    }

    # Fichiers PWA — jamais mis en cache (le navigateur doit toujours vérifier les mises à jour)
    location = /sw.js {
        root       /usr/share/nginx/react-app;
        expires    -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /manifest.json {
        root       /usr/share/nginx/react-app;
        expires    -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # React SPA — app.sapscope.com
    location / {
        root       /usr/share/nginx/react-app;
        index      index.html;
        try_files  $uri $uri/ /index.html;

        location = /index.html {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        location ~* \.(?:js|css|woff2?|ttf|eot|ico|png|svg)$ {
            expires    1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
