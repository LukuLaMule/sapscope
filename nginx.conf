# ── Landing page — sapscope.com ───────────────────────────────────────────────
server {
    listen 80;
    server_name sapscope.com;

    location /fonts/ {
        root   /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;

        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        location ~* \.(css|js|svg)$ {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }
}



# ── Application — app.sapscope.com ────────────────────────────────────────────
server {
    listen 80;
    server_name app.sapscope.com;

    # API → backend
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        client_max_body_size 5m;
    }

    location /healthz {
        proxy_pass http://backend:8000;
    }

    # Agent distribution (tarball + checksum)
    location /dist/ {
        root       /usr/share/nginx/html;
        autoindex  off;
        expires    1h;
        add_header Cache-Control "public, no-transform";
    }

    # App (SPA)
    location = /app {
        root       /usr/share/nginx/html;
        try_files  /app.html =404;
    }

    # Documentation
    location = /docs {
        root       /usr/share/nginx/html;
        try_files  /docs.html =404;
    }

    location /docs/ {
        root       /usr/share/nginx/html;
        autoindex  off;
    }

    # Polices self-hébergées
    location /fonts/ {
        root       /usr/share/nginx/html;
        expires    1y;
        add_header Cache-Control "public, immutable";
    }

    # Frontend static files
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;

        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        location ~* \.(css|js|svg)$ {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }
}
